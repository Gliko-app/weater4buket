<!doctype html>
<html lang="sr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Weather Widget 980x280</title>
  <link rel="stylesheet" href="style.css" />
  <script src="app.js" defer></script>
</head>
<body>
  <div class="widget" role="application" aria-label="Weather widget 980x280">
    <div class="top">
      <!-- LEFT -->
      <section class="left">
        <div class="city" id="city">Zlatibor</div>
        <div class="tempRow">
          <div class="temp" id="temp">--°C</div>
          <img class="iconMain" id="iconMain" alt="" />
        </div>
        <div class="desc" id="desc">Učitavanje...</div>
      </section>

      <!-- RIGHT -->
      <section class="right">
        <div class="metrics">
          <div class="metricCard">
            <div class="metricLabel">VLAŽNOST</div>
            <div class="metricValue" id="humidity">--%</div>
          </div>
          <div class="metricCard">
            <div class="metricLabel">VETAR</div>
            <div class="metricValue" id="wind">-- km/h</div>
          </div>
          <div class="metricCard metricWide">
            <div class="metricLabel">PRITISAK</div>
            <div class="metricValue" id="pressure">---- hPa</div>
          </div>
        </div>

        <div class="forecast" id="forecast">
          <!-- Popunjava JS -->
        </div>
      </section>
    </div>

    <div class="updated" id="updated">Ažurirano: --:--</div>
    <div class="error" id="error" hidden></div>
  </div>
</body>
</html>
